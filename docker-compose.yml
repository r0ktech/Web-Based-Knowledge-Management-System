version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: abia_kms_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: abia_kms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - abia_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: abia_kms_backend
    restart: always
    depends_on:
      - db
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/abia_kms?schema=public
      - JWT_SECRET=abia_state_kms_secret_key_2026_super_secure
      - JWT_REFRESH_SECRET=abia_state_kms_refresh_secret_key_2026_super_secure
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - abia_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: abia_kms_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    networks:
      - abia_network

networks:
  abia_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
